templates:
  - worker-bare

shared_files:
  - source: default-gitignore
    dest: .gitignore

language_files:
  common:
    - '.gitignore'
    - 'README.md'
    - 'README*'
    - 'LICENSE'
    - 'LICENSE*'
  typescript:
    - '*.ts'
    - 'tsconfig.json'
    - 'iii.worker.ts.yaml'
  javascript:
    - '*.js'
    - 'iii.worker.js.yaml'
  node:
    - 'package.json'
  python:
    - '*.py'
    - 'pyproject.toml'
    - 'iii.worker.py.yaml'
  rust:
    - '*.rs'
    - 'Cargo.toml'
    - 'iii.worker.rust.yaml'
