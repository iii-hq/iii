extends: existence
message: "Explanation docs discuss concepts, not steps. '%s' is procedural—move to How-to or Tutorial docs."
level: warning
scope: sentence
ignorecase: true
tokens:
  - step 1
  - step 2
  - step 3
  - first run
  - then run
  - now run
  - execute the following
  - run this command
  - copy and paste
