extends: existence
message: "Reference docs should be neutral. '%s' expresses opinion—state facts instead."
level: warning
scope: sentence
ignorecase: true
tokens:
  - the best way
  - you should prefer
  - ideally
  - we recommend
  - it's better to
  - the preferred approach
  - you should always
  - you should never
  - the right way
  - the wrong way
