StylesPath = styles
MinAlertLevel = suggestion

# Treat MDX as Markdown
[formats]
mdx = md

[*.mdx]
BasedOnStyles = Diataxis, Terminology

# Tutorial content - learning-oriented
# Apply tutorial rules, disable others, disable cross-contamination (tutorial phrases are expected)
# Using **/tutorials/** to match versioned docs (e.g., 0-10-0/tutorials/**)
