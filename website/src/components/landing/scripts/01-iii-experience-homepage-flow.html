  const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  // -------- syntax highlighting (light, regex-based) --------
  const PY_KW = /\b(from|import|as|def|return|if|else|elif|or|and|not|None|True|False|in|is|for|while|class|with|try|except|finally|raise|lambda|pass|yield)\b/g;
  const TS_KW = /\b(import|from|export|const|let|var|async|await|return|if|else|new|function|class|interface|type|extends|implements|public|private|of|in|as|true|false|null|undefined)\b/g;

  // Token-based highlighter: tokenize on RAW source first using sentinel chars
  // (so it doesn't shred HTML entities), then escape, then expand sentinels into spans.
  function highlight(line, lang){
    if (!line) return '&nbsp;';
    const STX = '\u0001', ETX = '\u0002', SEP = '\u001E';
    const stash = [];
    const wrap = (cls, text) => { stash.push({cls, text}); return STX + (stash.length-1) + ETX; };

    let s = line;
    // 1. Comments first (consume the rest of the line)
    if (lang === 'python'){
      s = s.replace(/#[^\n]*$/g, m => wrap('tok-com', m));
    } else {
      s = s.replace(/\/\/[^\n]*$/g, m => wrap('tok-com', m));
    }
    // 2. Strings (single + double, no escapes for this sketch)
    s = s.replace(/'[^'\n]*'|"[^"\n]*"/g, m => wrap('tok-str', m));
    // 3. Keywords
    const kw = lang === 'python' ? PY_KW : TS_KW;
    s = s.replace(kw, m => wrap('tok-kw', m));
    // (numbers intentionally not highlighted — keeps sentinel-token expansion simple)

    // Now escape everything (sentinel chars are safe — not HTML)
    s = escapeHtml(s);
    // Expand sentinels — stashed text needs escaping too
    s = s.replace(/\u0001(\d+)\u0002/g, (_, idx) => {
      const t = stash[+idx];
      return '<span class="' + t.cls + '">' + escapeHtml(t.text) + '</span>';
    });
    return s || '&nbsp;';
  }

  function langIconHtml(language, filename){
    const fn = (filename || '').toLowerCase();
    const lc = (language || '').toLowerCase();
    const isTs = lc === 'typescript' || lc === 'ts' || fn.endsWith('.ts') || fn.endsWith('.tsx');
    const isPy = lc === 'python' || lc === 'py' || fn.endsWith('.py');
    if (isTs) return SVG_TS;
    if (isPy) return SVG_PY;
    return SVG_FILE;
  }

  function pin(){
    requestAnimationFrame(() => { seqScroll.scrollTop = seqScroll.scrollHeight; });
  }

  function showTypingDots(){
    let el = document.getElementById('seq-typing');
    if (el) return el;
    el = document.createElement('div');
    el.id = 'seq-typing';
    el.className = 'seq-typing';
    el.innerHTML = '<span></span><span></span><span></span>';
    seqScroll.appendChild(el);
    pin();
    return el;
  }
  function hideTypingDots(){
    const el = document.getElementById('seq-typing');
    if (el) el.remove();
  }

  function next(){
    if (isFinished) return;
    const nextIndex = currentIndex + 1;
    if (nextIndex >= HOMEPAGE_FLOW.length){
      currentIndex = nextIndex;
      visibleUpTo = HOMEPAGE_FLOW.length - 1;
      isFinished = true;
      renderFinish();
      return;
    }
    currentIndex = nextIndex;
    const step = HOMEPAGE_FLOW[nextIndex];
    const delay = step.delay || 0;
    if (delayTimer){ clearTimeout(delayTimer); delayTimer = null; }
    if (delay > 0){
      isDelaying = true;
      showTypingDots();
      delayTimer = setTimeout(() => {
        isDelaying = false;
        hideTypingDots();
        revealStep(nextIndex);
      }, delay);
    } else {
      revealStep(nextIndex);
    }
  }

  function revealStep(i){
    visibleUpTo = i;
    const step = HOMEPAGE_FLOW[i];
    iiiTrack('experience_step_reveal', {
      step_id: step.id,
      step_index: i,
      step_type: step.type
    });
    const wrap = document.createElement('div');
    wrap.className = 'seq-step';
    wrap.dataset.id = step.id;
    seqScroll.appendChild(wrap);
    stepEls[i] = wrap;
    stepStates[i] = { sessionKey };
    // schedule the typing dots for the *next* step's delay only after this step completes — handled in next()
    switch (step.type){
      case 'slack-message': renderChat(step, wrap, i); break;
      case 'reply': renderReply(step, wrap, i); break;
      case 'code-editor': renderCode(step, wrap, i); break;
      case 'status': renderStatus(step, wrap, i); break;
      case 'terminal-command': renderTerminal(step, wrap, i); break;
      case 'console-trace': renderTrace(step, wrap, i); break;
    }
    pin();
  }

  // -------- renderers --------
  function avatarInitials(name){
    return String(name).split(' ').map(w => w[0] || '').join('').slice(0,2).toUpperCase();
  }

  function renderChat(step, wrap, i){

      +     '<div class="meta"><span class="name">' + escapeHtml(step.sender.name) + '</span>' + role + '</div>'
      +     '<div class="text">' + escapeHtml(step.content) + '</div>'
      +     '<div class="cta-row"></div>'
      +   '</div>'
      + '</div>';
    const ctaRow = wrap.querySelector('.cta-row');
    let advanced = false;
    const advance = () => { if (advanced) return; advanced = true; ctaRow.innerHTML = ''; next(); };

    if (step.action){
      // ticket card — inline action affordance
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'ticket-card';
      const idStr = String(i + 1).padStart(3, '0');
      const badgeStr = step.action.count != null
        ? '<span class="ticket-badge">' + step.action.count + '</span>'
        : '';
      btn.innerHTML = ''
        + '<div class="ticket-stamp">'
        +   '<span class="stamp-id">TKT-' + idStr + '</span>'
        +   '<span class="stamp-sep">/</span>'
        +   '<span class="stamp-title">' + escapeHtml(step.action.title || ((step.sender && step.sender.name) || '').split(' ')[0]) + '</span>'
        +   '<span class="stamp-spacer"></span>'
        + '</div>'
        + '<div class="ticket-action">'
        +   '<span class="arrow"></span>'
        +   '<span class="label">' + escapeHtml(step.action.label) + '</span>'
        +   '<span class="key-hint"><kbd>\u21B5</kbd></span>'
        + '</div>'
        + badgeStr;
      btn.addEventListener('click', () => {
        iiiTrack('cta_click', {
          cta_id: 'experience_start',
          cta_location: 'experience',
          cta_label: (step.action.label || '').trim().toLowerCase(),
          step_id: step.id
        });
        trackStepAdvance(step, step.action.label);
        // Drop the intro hero state on first interaction — text + spacing animate back to normal flow.
        seqScroll.classList.remove('is-intro');
        advance();
      });
      ctaRow.appendChild(btn);
    } else if (step.autoAdvance){
      const t = setTimeout(advance, step.autoAdvance);
      stepStates[i].timer = t;
    } else {
      const a = document.createElement('button');
      a.type = 'button'; a.className = 'continue-link';
      a.textContent = 'Continue';
      a.addEventListener('click', () => { trackStepAdvance(step, 'Continue'); advance(); });
      ctaRow.appendChild(a);
    }
  }

  function renderReply(step, wrap, i){
    wrap.innerHTML = ''
      + '<div class="xp-reply">'
      +   '<div class="bubble">'
      +     '<div class="text"><span class="content"></span><span class="caret"></span></div>'
      +     '<div class="actions"><span class="typing">typing&hellip;</span></div>'
      +   '</div>'
      + '</div>';
    const root = wrap.querySelector('.xp-reply');
    const contentEl = wrap.querySelector('.content');
    const caret = wrap.querySelector('.caret');
    const actions = wrap.querySelector('.actions');
    const speed = step.typingSpeed || 40;
    const words = step.content.split(' ');
    let wi = 0;
    const tick = setInterval(() => {
      if (stepStates[i].sessionKey !== sessionKey){ clearInterval(tick); return; }
      if (wi < words.length){
        contentEl.textContent = (contentEl.textContent ? contentEl.textContent + ' ' : '') + words[wi];
        wi++;
        pin();
      } else {
        clearInterval(tick);
        caret.remove();
        let advanced = false;
        const advance = () => {
          if (advanced) return; advanced = true;
          // sent state: remove composer chrome, leave bubble accented
          actions.remove();
          root.classList.add('sent');
          next();
        };
        if (step.autoAdvance){
          const t = setTimeout(advance, step.autoAdvance);
          stepStates[i].timer = t;
        } else {
          actions.innerHTML = '';
          const btn = document.createElement('button');
          btn.type = 'button'; btn.className = 'send';
          btn.textContent = step.sendLabel || 'Send';
          btn.addEventListener('click', () => { trackStepAdvance(step, btn.textContent); advance(); });
          actions.appendChild(btn);
          pin();
        }
      }
    }, speed);
    stepStates[i].interval = tick;
  }

  function renderCode(step, wrap, i){
    wrap.innerHTML = ''
      + '<div class="xp-code">'
      +   '<div class="xp-code-head">'
      +     '<div class="file">' + langIconHtml(step.language, step.filename) + '<span class="filename">' + escapeHtml(step.filename) + '</span></div>'
      +   '</div>'
      +   '<div class="xp-code-body" id="cb-' + i + '"><div class="empty">Ready to write&hellip;</div></div>'
      +   '<div class="xp-code-actions"><span class="writing">writing&hellip;</span></div>'
      + '</div>';
    const body = wrap.querySelector('.xp-code-body');
    const actions = wrap.querySelector('.xp-code-actions');
    const lineDelay = step.lineDelay || 220;
    let li = 0;
    // start writing after a short beat
    const startTimer = setTimeout(() => {
      body.innerHTML = '';
      const tick = setInterval(() => {
        if (stepStates[i].sessionKey !== sessionKey){ clearInterval(tick); return; }
        if (li < step.lines.length){
          const lineEl = document.createElement('div');
          lineEl.className = 'xp-code-line';
          const num = li + 1;
          const html = highlight(step.lines[li], step.language);
          lineEl.innerHTML = '<span class="ln">' + num + '</span><span class="src">' + html + '</span>';
          body.appendChild(lineEl);
          li++;
          body.scrollTop = body.scrollHeight;
          pin();
        } else {
          clearInterval(tick);
          // write done
          let advanced = false;
          const advance = () => {
            if (advanced) return; advanced = true;
            // collapse to compact completed line
            wrap.innerHTML = ''
              + '<div class="xp-code completed">'
              +   '<div class="completed-line">'
              +     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
              +     langIconHtml(step.language, step.filename)
              +     '<span>' + escapeHtml(step.filename) + ' completed</span>'
              +   '</div>'
              + '</div>';
            next();
          };
          if (step.autoAdvance){
            const t = setTimeout(advance, step.autoAdvance);
            stepStates[i].timer = t;
          } else {
            actions.innerHTML = '';
            const btn = document.createElement('button');
            btn.type = 'button'; btn.className = 'deploy';
            btn.textContent = step.doneLabel || 'Deploy';
            btn.addEventListener('click', () => { trackStepAdvance(step, btn.textContent); advance(); });
            actions.appendChild(btn);
            pin();
          }
        }
      }, lineDelay);
      stepStates[i].interval = tick;
    }, 400);
    stepStates[i].timer = startTimer;
  }

  function renderStatus(step, wrap, i){
    const variant = step.variant || 'info';
    const icon = STATUS_ICONS[step.icon] || '\u2022';
    wrap.innerHTML = ''
      + '<div class="xp-status v-' + variant + '">'
      +   '<div class="ico">' + icon + '</div>'
      +   '<div class="body">'
      +     '<div class="head">' + escapeHtml(step.headline) + '</div>'
      +     (step.detail ? '<div class="detail">' + escapeHtml(step.detail) + '</div>' : '')
      +   '</div>'
      +   '<div class="cta-slot"></div>'
      + '</div>';
    const slot = wrap.querySelector('.cta-slot');
    let advanced = false;
    const advance = () => { if (advanced) return; advanced = true; slot.innerHTML=''; next(); };
    if (step.autoAdvance){
      const t = setTimeout(advance, step.autoAdvance);
      stepStates[i].timer = t;
    } else {
      const a = document.createElement('button');
      a.type = 'button'; a.className = 'continue-link';
      a.textContent = 'continue';
      a.addEventListener('click', () => { trackStepAdvance(step, 'continue'); advance(); });
      slot.appendChild(a);
    }
  }

  function renderTerminal(step, wrap, i){
    wrap.innerHTML = ''
      + '<div class="xp-term">'
      +   '<div class="head">terminal</div>'
      +   '<div class="body">'
      +     '<div class="row"><span class="prompt">&gt;</span><span class="cmd"></span><span class="caret"></span></div>'
      +     '<div class="out" hidden></div>'
      +   '</div>'
      + '</div>';
    const cmdEl = wrap.querySelector('.cmd');
    const caret = wrap.querySelector('.caret');
    const outEl = wrap.querySelector('.out');
    const speed = step.typingSpeed || 40;
    const cmd = step.command;
    let ci = 0;
    const tick = setInterval(() => {
      if (stepStates[i].sessionKey !== sessionKey){ clearInterval(tick); return; }
      if (ci < cmd.length){
        cmdEl.textContent = cmd.slice(0, ci + 1);
        ci++;
      } else {
        clearInterval(tick);
        caret.remove();
        setTimeout(() => {
          outEl.hidden = false;
          outEl.textContent = step.output;
          pin();
          // auto advance after output
          const t = setTimeout(next, step.autoAdvance || 800);
          stepStates[i].timer = t;
        }, 300);
      }
    }, speed);
    stepStates[i].interval = tick;
  }

  function renderTrace(step, wrap, i){
    const phasesHtml = ['traces','waterfall','detail'].map(p => '<span class="ph ph-' + p + '">' + p + '</span>').join('');
    wrap.innerHTML = ''
      + '<div class="xp-trace">'
      +   '<div class="head">'
      +     '<span class="label"><span class="pulse"></span>iii console</span>'
      +     '<span class="phases">' + phasesHtml + '</span>'
      +   '</div>'
      +   '<div class="traces"></div>'
      +   '<div class="waterfall hidden"></div>'
      +   '<div class="detail hidden"></div>'
      +   '<div class="xp-trace-actions"></div>'
      + '</div>';
    const root = wrap.querySelector('.xp-trace');
    const tracesEl = wrap.querySelector('.traces');
    const wfEl = wrap.querySelector('.waterfall');
    const detEl = wrap.querySelector('.detail');
    const actEl = wrap.querySelector('.xp-trace-actions');
    const phEls = {
      traces: wrap.querySelector('.ph-traces'),
      waterfall: wrap.querySelector('.ph-waterfall'),
      detail: wrap.querySelector('.ph-detail')
    };
    phEls.traces.classList.add('on');

    // build trace rows (hidden initially)
    step.traces.forEach((t, ti) => {
      const isErr = t.status === 'error';
      const isSel = ti === step.activeTraceIndex;
      const row = document.createElement('div');
      row.className = 'trace-row hidden' + (isErr ? ' err' : '') + (isSel ? ' sel' : '');
      row.innerHTML = ''
        + '<span class="dot"></span>'
        + '<span class="op">' + escapeHtml(t.operation) + '</span>'
        + '<span class="dur">' + escapeHtml(t.duration || '---') + '</span>'
        + '<span class="st">' + (isErr ? 'ERR' : 'OK') + '</span>';
      tracesEl.appendChild(row);
    });
    // reveal trace rows staggered
    const rowEls = tracesEl.querySelectorAll('.trace-row');
    rowEls.forEach((r, idx) => {
      const t = setTimeout(() => {
        if (stepStates[i].sessionKey !== sessionKey) return;
        r.classList.remove('hidden');
        pin();
      }, 100 + idx * 80);
      (stepStates[i].timers = stepStates[i].timers || []).push(t);
    });
    const traceDelay = step.traces.length * 80 + 400;
    const wfDelay = traceDelay + step.spans.length * 120 + 400;
    const detailDelay = wfDelay + 400;

    // waterfall phase
    (stepStates[i].timers || (stepStates[i].timers = [])).push(setTimeout(() => {
      if (stepStates[i].sessionKey !== sessionKey) return;
      phEls.traces.classList.remove('on');
      phEls.waterfall.classList.add('on');
      wfEl.classList.remove('hidden');
      step.spans.forEach((sp, si) => {
        const isErr = sp.status === 'error';
        const row = document.createElement('div');
        row.className = 'span-row hidden' + (isErr ? ' err' : '');
        row.style.paddingLeft = (sp.depth * 16 + 8) + 'px';
        row.innerHTML = ''
          + '<span class="arrow">\u25B8</span>'
          + '<span class="label">' + escapeHtml(sp.label) + '</span>'
          + '<span class="bar-wrap"><span class="bar-bg"><span class="bar"></span></span><span class="dur">' + escapeHtml(sp.duration) + '</span></span>'
          + (isErr ? '<span class="err-tag">ERROR</span>' : '');
        wfEl.appendChild(row);
        const t1 = setTimeout(() => {
          if (stepStates[i].sessionKey !== sessionKey) return;
          row.classList.remove('hidden');
          const bar = row.querySelector('.bar');
          const t2 = setTimeout(() => { if (bar) bar.style.width = sp.widthPercent + '%'; }, 80);
          stepStates[i].timers.push(t2);
          pin();
        }, si * 120);
        stepStates[i].timers.push(t1);
      });
    }, traceDelay));

    // detail phase
    stepStates[i].timers.push(setTimeout(() => {
      if (stepStates[i].sessionKey !== sessionKey) return;
      phEls.waterfall.classList.remove('on');
      phEls.detail.classList.add('on');
      detEl.classList.remove('hidden');
      const d = step.detail;
      detEl.innerHTML = ''
        + '<div class="row"><span class="key">Status</span><span class="val err">' + escapeHtml(d.status) + '</span></div>'
        + '<div class="row"><span class="key">Service</span><span class="val">' + escapeHtml(d.service) + '</span></div>'
        + (d.error ? '<div class="row"><span class="key">Error</span><span class="val err-text">' + escapeHtml(d.error) + '</span></div>' : '');
      pin();
      // auto-advance OR show Continue
      let advanced = false;
      const advance = () => {
        if (advanced) return; advanced = true;
        // collapse to compact line
        const hasErr = step.errorSpanIndex != null;
        wrap.innerHTML = ''
          + '<div class="xp-trace completed' + (hasErr ? ' err' : '') + '">'
          +   '<div class="completed-line">'
          +     '<span>' + (hasErr ? '\u25C9 Error identified in traces' : '\u2713 Traces inspected') + '</span>'
          +   '</div>'
          + '</div>';
        next();
      };
      if (step.autoAdvance){
        const t = setTimeout(advance, step.autoAdvance);
        stepStates[i].timers.push(t);
      } else {
        const btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'deploy';
        btn.textContent = 'Continue';
        btn.addEventListener('click', () => { trackStepAdvance(step, 'Continue'); advance(); });
        actEl.appendChild(btn);
      }
    }, detailDelay));
  }

  function renderFinish(){
    hideTypingDots();
    iiiTrack('experience_complete', { steps_total: HOMEPAGE_FLOW.length });
    const el = document.createElement('div');
    el.className = 'seq-step';
    el.innerHTML = ''
      + '<div class="seq-finish">'
      +   '<div class="lead">Try it for yourself</div>'
      +   '<a href="https://iii.dev/docs/quickstart" class="quick" target="_blank" rel="noopener noreferrer">Quickstart Guide \u2192</a>'
      + '</div>';
    seqScroll.appendChild(el);
    const quickLink = el.querySelector('.quick');
    if (quickLink) quickLink.addEventListener('click', () => {
      iiiTrack('cta_click', {
        cta_id: 'quickstart',
        cta_location: 'experience_finish',
        cta_label: 'quickstart guide',
        cta_href: quickLink.getAttribute('href') || ''
      });
    });
    pin();
  }

  function clearAllTimers(){
    if (delayTimer){ clearTimeout(delayTimer); delayTimer = null; }
    stepStates.forEach(s => {
      if (!s) return;
      if (s.timer) clearTimeout(s.timer);
      if (s.interval) clearInterval(s.interval);
      if (s.timers) s.timers.forEach(t => clearTimeout(t));
    });
  }

  function startSession(){
    clearAllTimers();
    sessionKey++;
    currentIndex = 0;
    visibleUpTo = -1;
    isDelaying = false;
    isFinished = false;
    stepEls = [];
    stepStates = [];
    seqScroll.innerHTML = '';
    seqScroll.classList.add('is-intro');
    if (!HOMEPAGE_FLOW.length) return;
    const firstDelay = HOMEPAGE_FLOW[0].delay || 250;
    isDelaying = true;
    showTypingDots();
    delayTimer = setTimeout(() => {
      isDelaying = false;
      hideTypingDots();
      revealStep(0);
    }, firstDelay);
  }

  let started = false;
  function startWhenVisible(){
    const xp = document.getElementById('experience');
    if (!('IntersectionObserver' in window)){
      iiiTrack('experience_start', { trigger: 'no_intersection_observer' });
      startSession();
      started = true;
      return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting && !started){
          started = true;
          iiiTrack('experience_start', { trigger: 'viewport' });
          startSession();
          io.disconnect();
        }
      });
    }, { threshold: 0.2 });
    io.observe(xp);
  }
  startWhenVisible();

  seqRestart.addEventListener('click', () => {
    iiiTrack('experience_restart', { reached_step_index: visibleUpTo, reached_step_id: (HOMEPAGE_FLOW[visibleUpTo] && HOMEPAGE_FLOW[visibleUpTo].id) || null });
    startSession();
  });
</script>
