name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'tech-specs/**'
      - 'infra/terraform/website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (default: current default branch)'
        required: false
        type: string

concurrency:
  group: deploy-website
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    environment: iii-website-prod
    timeout-minutes: 15

    env:
      AWS_REGION: us-east-1

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # One build emits the whole site into website/dist/: the Astro pages
      # (landing, manifesto, privacy, /blog), the roadmap decks (dist/roadmap/),
      # and the generated llms.txt, AGENTS.md, and sitemap.xml.
      - name: Build site (Astro + roadmap → website/dist/)
        run: pnpm --filter iii-website build

      - name: Configure AWS credentials (GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # website/dist/ is the complete site, so two syncs cover everything.
      # Hashed build assets (Astro /_astro/, deck assets/) plus fonts and
      # images are immutable; every content-mutable file — HTML, XML (sitemap,
      # RSS), JSON (roadmap feed, viewer spec.json), markdown (raw specs,
      # AGENTS.md), text (robots.txt, llms.txt), and the unhashed
      # posthog-consent.js — must revalidate so new deploys surface right
      # after the CloudFront invalidation.
      - name: Sync static assets (long cache, immutable)
        run: |
          aws s3 sync website/dist/ "s3://${{ vars.S3_BUCKET }}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "*.json" \
            --exclude "*.md" \
            --exclude "*.txt" \
            --exclude "posthog-consent.js"

      - name: Sync content files (no cache, must revalidate)
        run: |
          aws s3 sync website/dist/ "s3://${{ vars.S3_BUCKET }}/" \
            --delete \
            --cache-control "public,max-age=0,must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.xml" \
            --include "*.json" \
            --include "*.md" \
            --include "*.txt" \
            --include "posthog-consent.js"

      # Keep the CloudFront KeyValueStore route map (pretty URL → .html) in sync
      # with the dist/*.html pages we just uploaded. This is what lets a new
      # page work without a `terraform apply` (MOT-3669): the redirects function
      # reads this store at the edge. Runs AFTER the HTML sync so a key is never
      # published before its object exists. `concurrency: deploy-website`
      # serializes deploys, so the describe-time ETag stays valid for update-keys.
      - name: Sync pretty-URL route map to CloudFront KeyValueStore
        if: ${{ vars.CF_KVS_ARN != '' }}
        env:
          KVS_ARN: ${{ vars.CF_KVS_ARN }}
        run: |
          set -euo pipefail
          etag=$(aws cloudfront-keyvaluestore describe-key-value-store \
            --kvs-arn "$KVS_ARN" --query ETag --output text)
          aws cloudfront-keyvaluestore list-keys \
            --kvs-arn "$KVS_ARN" --query 'Items' --output json > /tmp/kvs-current.json
          ops=$(pnpm --filter iii-website exec tsx scripts/routes-kvs.ts --current /tmp/kvs-current.json)
          puts=$(jq -c '.Puts' <<<"$ops")
          deletes=$(jq -c '.Deletes' <<<"$ops")
          if [ "$puts" = '[]' ] && [ "$deletes" = '[]' ]; then
            echo "KVS route map already in sync; nothing to update."
            exit 0
          fi
          args=(--kvs-arn "$KVS_ARN" --if-match "$etag")
          [ "$puts" != '[]' ] && args+=(--puts "$puts")
          [ "$deletes" != '[]' ] && args+=(--deletes "$deletes")
          aws cloudfront-keyvaluestore update-keys "${args[@]}"
          echo "KVS route map updated. puts=$puts deletes=$deletes"

      - name: Create CloudFront invalidation
        id: invalidation
        run: |
          inv_id=$(aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CF_DISTRIBUTION_ID }}" \
            --paths '/*' \
            --query 'Invalidation.Id' \
            --output text)
          echo "id=$inv_id" >> "$GITHUB_OUTPUT"
          echo "Invalidation $inv_id created."

      - name: Job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## iii.dev deploy complete

          - Bucket: \`${{ vars.S3_BUCKET }}\`
          - Distribution: \`${{ vars.CF_DISTRIBUTION_ID }}\`
          - Invalidation: \`${{ steps.invalidation.outputs.id }}\`
          - Commit: \`${{ github.sha }}\`
          EOF
