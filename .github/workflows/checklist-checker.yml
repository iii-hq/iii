name: 'PR Tasks Completed Check'
on:
  pull_request:
    types: [opened, edited]

jobs:
  task-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check org membership
        id: org-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USER=$(jq -r '.pull_request.user.login' "$GITHUB_EVENT_PATH")
          if gh api "/orgs/iii-hq/members/$USER" --silent 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check all tasks are completed
        if: steps.org-check.outputs.skip == 'false'
        run: |
          BODY=$(jq -r '.pull_request.body' "$GITHUB_EVENT_PATH")
          TOTAL=$(echo "$BODY" | grep -cE '^\s*- \[[ xX]\]' || true)
          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::PR has no checklist items — do not remove the template checklist"
            exit 1
          fi
          if ! echo "$BODY" | grep -qE '^\s*- \[[xX]\].*Apache 2'; then
            echo "::error::The Apache 2 licensing checkbox must be checked"
            exit 1
          fi
          UNCHECKED=$(echo "$BODY" | grep -cE '^\s*- \[ \]' || true)
          if [ "$UNCHECKED" -gt 0 ]; then
            echo "::error::PR has $UNCHECKED unchecked task(s)"
            exit 1
          fi
