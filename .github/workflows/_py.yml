name: PyPI Publish

on:
  workflow_dispatch:
    inputs:
      package_path:
        description: 'Package directory (e.g., sdk/packages/python/iii)'
        required: true
        type: string
      dry_run:
        description: 'Build and validate without publishing'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      package_path:
        description: 'Package directory (e.g., sdk/packages/python/iii)'
        required: true
        type: string
      dry_run:
        description: 'Build and validate without publishing'
        required: false
        type: boolean
        default: false
      slack_thread_ts:
        description: 'Slack parent message timestamp for thread replies (optional)'
        required: false
        type: string
        default: ''
      slack_label:
        description: 'Label for this step in Slack notifications (optional)'
        required: false
        type: string
        default: ''
    secrets:
      PYPI_API_TOKEN:
        required: true
      SLACK_BOT_TOKEN:
        required: false
      SLACK_CHANNEL_ID:
        required: false

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Notify Slack — in progress
        if: inputs.slack_thread_ts != ''
        id: slack
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            thread_ts: "${{ inputs.slack_thread_ts }}"
            text: ":large_yellow_circle: ${{ inputs.slack_label }}${{ inputs.dry_run == true && ' (dry run)' || '' }} — in progress"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5

      - name: Build package
        working-directory: ${{ inputs.package_path }}
        run: uv build

      - name: Validate package
        if: inputs.dry_run == true
        working-directory: ${{ inputs.package_path }}
        run: uvx twine check dist/*

      - name: Check if version already published
        id: check_pypi
        if: inputs.dry_run != true
        working-directory: ${{ inputs.package_path }}
        run: |
          PKG_NAME=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if pip index versions "$PKG_NAME" 2>/dev/null | grep -q "$PKG_VERSION"; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${PKG_NAME}==${PKG_VERSION} already published — skipping"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: inputs.dry_run != true && steps.check_pypi.outputs.already_published != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ inputs.package_path }}/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Notify Slack — result
        if: always() && steps.slack.outputs.ts != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.update
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            ts: "${{ steps.slack.outputs.ts }}"
            text: "${{ job.status == 'success' && ':large_green_circle:' || ':red_circle:' }} ${{ inputs.slack_label }}${{ inputs.dry_run == true && ' (dry run)' || '' }} — ${{ job.status }}"
