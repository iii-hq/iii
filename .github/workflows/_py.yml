name: PyPI Build

on:
  workflow_call:
    inputs:
      package_path:
        description: 'Package directory (e.g., sdk/packages/python/iii)'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout (default: the triggering ref)'
        required: false
        type: string
        default: ''
      artifact_name:
        description: 'Workflow artifact containing the built distributions'
        required: true
        type: string

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        working-directory: ${{ inputs.package_path }}
        run: python -m build

      - name: Validate package
        run: twine check ${{ inputs.package_path }}/dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.package_path }}/dist/
          if-no-files-found: error
          retention-days: 1
